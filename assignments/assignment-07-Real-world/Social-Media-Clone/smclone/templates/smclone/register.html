{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block tittle %} Registration {% endblock %}</title>
    <link rel="stylesheet" href="{% static 'smclone/css/style.css' %}" />
  </head>
  <body>
    <main class="auth-card">
      <h1>Create account</h1>

      <form method="POST" novalidate>
        {% csrf_token %} {{ form.as_p }}

        <button type="submit">Sign Up</button>

        <p class="auth-link">
          Already have account? <a href="{% url 'login' %}">Log in</a>
        </p>
      </form>

      <footer class="site-footer">
        <p>&copy; 2026 Social Media Clone. All rights reserved.</p>
      </footer>
    </main>
  </body>
</html>
