{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block tittle %} Log in {% endblock %}</title>
    <link rel="stylesheet" href="{% static 'smclone/css/style.css' %}" />
  </head>
  <body>
    <h1>Login</h1>

    {% if messages %} {% for message in messages %}
    <p>{{ message }}</p>
    {% endfor %} {% endif %}
    
    <form method="POST">
      {% csrf_token %} {{ form.as_p }}

      <button type="submit">Login</button>
    </form>
  </body>
</html>
