{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset</title>

    <link rel="stylesheet" href="{% static 'smclone/css/style.css' %}" />
  </head>
  <body>
    <main class="auth-card">
      <h1>Reset your password</h1>
      <p>
        Enter your email address and we will send you instructions to reset your
        password.
      </p>

      <form method="POST" novalidate>
        {% csrf_token %} {{ form.as_p }}

        <button type="submit">sent reset email</button>
      </form>

      <p class="auth-link"><a href="{% url 'login' %}">Back to login</a></p>
      <footer class="site-footer">
        <p>&copy; 2026 Social Media Clone. All rights reserved.</p>
      </footer>
    </main>
  </body>
</html>
