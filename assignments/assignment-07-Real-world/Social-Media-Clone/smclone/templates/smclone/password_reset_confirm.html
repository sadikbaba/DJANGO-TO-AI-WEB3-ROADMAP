{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Set a new password</title>

    <link
      rel="stylesheet"
      href="{% static 'smclone/css/style.css' %}"
    />
  </head>

  <body>
    <main class="auth-card">
      <h1>Set a new password</h1>

      <p>
        Enter your new password below.
      </p>

      <form method="POST" novalidate>
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
          Change password
        </button>
      </form>

      <p class="auth-link">
        <a href="{% url 'login' %}">
          Back to login
        </a>
      </p>

      <footer class="site-footer">
        <p>&copy; 2026 Social Media Clone. All rights reserved.</p>
      </footer>
    </main>
  </body>
</html>
