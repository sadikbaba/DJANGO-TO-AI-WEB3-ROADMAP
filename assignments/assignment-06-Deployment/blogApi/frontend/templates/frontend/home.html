{% extends "frontend/base.html" %}
{% load static %}

{% block title %}Home{% endblock %}

{% block content %}

<div class="container">

    <div id="create-post-section" style="display: none;">

        <h2>Create a Post</h2>

        <form id="create-post-form">

            <div class="form-group">
                <label for="title">Title</label>

                <input
                    type="text"
                    id="title"
                    required
                >
            </div>

            <div class="form-group">
                <label for="content">Content</label>

                <textarea
                    id="content"
                    required
                ></textarea>
            </div>

            <div class="form-group">
                <label for="category">Category</label>

                <select
                    id="category"
                    required
                >
                    <option value="">
                        Loading categories...
                    </option>
                </select>
            </div>

            <button type="submit">
                Publish
            </button>

        </form>

        <p id="create-post-message"></p>

    </div>

    <h2>Latest Posts</h2>

    <div id="posts-container">
        <p>Loading posts...</p>
    </div>

</div>

{% endblock %}

{% block extra_js %}
<script src="{% static 'frontend/js/home.js' %}"></script>
{% endblock %}
